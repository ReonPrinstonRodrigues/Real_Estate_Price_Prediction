<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EstateVision | Sign Up</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    body { margin:0; font-family:'Inter', sans-serif; background:#f1f5f9; color: #0f172a; }
    .hero { height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(circle at center, #e2e8f0 0%, #f1f5f9 100%); }
    .login-container { background:white; padding:45px 40px; width:360px; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.05); text-align:center; border: 1px solid #e2e8f0; }
    .login-container h2 { margin-bottom:30px; font-size:24px; color: #1e293b; font-weight: 700;}
    .input-group { margin-bottom:20px; text-align:left; }
    label { font-size:13px; font-weight:600; color:#64748b; margin-bottom: 6px; display: block; }
    input { width:100%; padding:12px 14px; border:1px solid #cbd5e1; border-radius:10px; font-size:14px; box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    button { width:100%; padding:14px; border:none; background:linear-gradient(135deg,#4f46e5,#9333ea); color:white; font-size:15px; font-weight:600; border-radius:10px; cursor:pointer; transition:0.2s; box-shadow:0 4px 12px rgba(79,70,229,0.25); margin-top: 10px; }
    button:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(79,70,229,0.35); }
    .extra { margin-top:20px; font-size:14px; color: #64748b; }
    .extra a { color:#4f46e5; font-weight:600; text-decoration:none; }
    .back-home { position: absolute; top: 30px; left: 40px; text-decoration: none; color: #475569; font-weight: 500; font-size: 14px; }
    .back-home:hover { color: #4f46e5; }
</style>
</head>
<body>

<a href="/" class="back-home">&larr; Back to Home</a>

<div class="hero">
    <div class="login-container">
        <h2>Create Account</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password">
        </div>
        
        <button onclick="signupUser()">Sign Up</button>
        
        <div class="extra">
            <p>Already have an account? <a href="/login">Sign In</a></p>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://pqtshfjiahvgjmmmcanr.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdHNoZmppYWh2Z2ptbW1jYW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MzAyNzMsImV4cCI6MjA4OTIwNjI3M30.jiNaBme7XunFj8UhzzpqqHkdj19vOSUb52vfS5Y_JOw"
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function signupUser(){
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    if(email === "" || password === ""){
        alert("Please fill all fields")
        return
    }

    const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password
    })

    if(error){
        alert(error.message)
    } else {
        alert("Account created successfully! Please login.")
        window.location.href = "/login"
    }
}
</script>
</body>
</html>
